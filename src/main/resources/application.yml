server:
  port: 8080

spring:
  application:
    name: fund-copilot
  config:
    import: optional:file:./config/application-private.yml
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:fundcopilot;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:fund-copilot-disabled-key}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

fund-copilot:
  market-data:
    eastmoney:
      timeout-seconds: 6
      nav-page-size: 20
      nav-history-size: 320
      request-interval-ms: 300
      demo-fallback-enabled: ${FUND_MARKET_DEMO_FALLBACK_ENABLED:true}
  agent:
    base-url: ${FUND_OPENAI_BASE_URL:}
    api-key: ${FUND_OPENAI_API_KEY:}
    model-name: ${FUND_OPENAI_MODEL:gpt-5.4}
    enable-llm: ${FUND_AGENT_ENABLE_LLM:false}
    stage-max-iterations: ${FUND_AGENT_STAGE_MAX_ITERATIONS:3}
    final-max-iterations: ${FUND_AGENT_FINAL_MAX_ITERATIONS:6}
    request-timeout-seconds: ${FUND_AGENT_REQUEST_TIMEOUT_SECONDS:60}
    task-timeout-seconds: ${FUND_AGENT_TASK_TIMEOUT_SECONDS:300}
  cache:
    redis-enabled: ${FUND_CACHE_REDIS_ENABLED:true}
